quarkus.http.test-port=9091
books.genre=IT
%prod.books.genre=Horror
%dev.quarkus.log.category."io.quarkus".level=DEBUG

quarkus.http.auth.basic=true
quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.my-user=${MY_PASSWORD:my-password}
quarkus.security.users.embedded.roles.my-user=my-custom-role-here
quarkus.security.users.embedded.users.readonly-user=readonly-password
quarkus.security.users.embedded.roles.readonly-user=readonly
